name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '7.0'
          - '7.1'
          - '7.2'
          - '7.3'
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    env:
      DOCKER_COMPOSE: docker compose
      PHP_VERSION: ${{ matrix.php-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            php-bcmath \
            php-cli \
            php-intl \
            php-mbstring \
            php-xml \
            php-zip \
            unzip
          curl -sS https://getcomposer.org/installer | php
          sudo mv composer.phar /usr/local/bin/composer
          composer install --ignore-platform-reqs --no-interaction --prefer-dist

      - name: Pin PHPUnit for PHP 7
        if: startsWith(matrix.php-version, '7.')
        run: composer require --dev phpunit/phpunit:6.5.14 --ignore-platform-reqs --with-all-dependencies --no-interaction

      - name: Show tool versions
        run: |
          docker --version
          docker compose version
          composer --version

      - name: Build test image
        run: make build-test

      - name: Run tests
        run: make test

      - name: Upload coverage
        if: always()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "${CODECOV_TOKEN}" ] && [ -f coverage.xml ]; then
            make push-coverage
          else
            echo "Skipping Codecov upload; token or coverage file is missing."
          fi

      - name: Stop services
        if: always()
        run: make stop
